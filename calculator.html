<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персональный Калькулятор Энергий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .date-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .results {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .results.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .result-card.code-1 { border-color: #e74c3c; }
        .result-card.code-2 { border-color: #e67e22; }
        .result-card.code-3 { border-color: #f39c12; }
        .result-card.code-4 { border-color: #2ecc71; }
        .result-card.code-5 { border-color: #3498db; }
        .result-card.code-6 { border-color: #9b59b6; }
        .result-card.code-7 { border-color: #8e44ad; }
        .result-card.code-8 { border-color: #34495e; }
        .result-card.code-9 { border-color: #ecf0f1; }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .result-value {
            font-size: 32px;
            font-weight: 900;
            color: #764ba2;
        }

        .result-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .result-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .meta-item {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
        }

        .meta-label {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .meta-value {
            color: #333;
            font-weight: 600;
        }

        .btn-restart {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            margin-top: 20px;
        }

        .personal-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .personal-info h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .personal-info p {
            opacity: 0.9;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .content {
                padding: 25px;
            }

            .date-inputs {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .result-value {
                font-size: 24px;
            }

            .result-meta {
                grid-template-columns: 1fr;
            }
        }

        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .direction-icon {
            font-size: 40px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 Персональный Калькулятор Энергий</h1>
            <p>Узнайте свои уникальные коды и частоты на основе даты рождения</p>
        </div>

        <div class="content">
            <div class="form-section" id="formSection">
                <div class="form-group">
                    <label for="name">Ваше имя</label>
                    <input type="text" id="name" placeholder="Например: Екатерина" required>
                </div>

                <div class="form-group">
                    <label>Дата рождения</label>
                    <div class="date-inputs">
                        <input type="number" id="day" placeholder="День" min="1" max="31" required>
                        <input type="number" id="month" placeholder="Месяц" min="1" max="12" required>
                        <input type="number" id="year" placeholder="Год" min="1900" max="2024" required>
                    </div>
                </div>

                <button onclick="calculate()">Рассчитать мои энергии</button>
            </div>

            <div class="results" id="results">
                <div class="personal-info" id="personalInfo"></div>
                <div id="resultsContainer"></div>
                <button class="btn-restart" onclick="restart()">Рассчитать заново</button>
            </div>
        </div>
    </div>

    <script>
        // Таблица букв для расчета Частоты Имени
        const letterValues = {
            'А': 1, 'Б': 2, 'В': 3, 'Г': 4, 'Д': 5, 'Е': 6, 'Ё': 7, 'Ж': 8, 'З': 9,
            'И': 1, 'Й': 2, 'К': 3, 'Л': 4, 'М': 5, 'Н': 6, 'О': 7, 'П': 8, 'Р': 9,
            'С': 1, 'Т': 2, 'У': 3, 'Ф': 4, 'Х': 5, 'Ц': 6, 'Ч': 7, 'Ш': 8, 'Щ': 9,
            'Ъ': 1, 'Ы': 2, 'Ь': 3, 'Э': 4, 'Ю': 5, 'Я': 6
        };

        // Описания кодов ПКК
        const pkkDescriptions = {
            1: { name: 'ИНИЦИАТОР', freq: '396 Гц', mantra: 'ОМ-ЛАМ-ХУМ', color: 'Красный', action: 'Вы материализуете через НАЧИНАНИЕ' },
            2: { name: 'ГАРМОНИЗАТОР', freq: '417 Гц', mantra: 'ОМ-ВАМ-ХУМ', color: 'Оранжевый', action: 'Вы материализуете через СОТРУДНИЧЕСТВО' },
            3: { name: 'ТВОРЕЦ', freq: '528 Гц', mantra: 'ОМ-РАМ-ХУМ', color: 'Жёлтый', action: 'Вы материализуете через ТВОРЧЕСТВО' },
            4: { name: 'СТРОИТЕЛЬ', freq: '639 Гц', mantra: 'ОМ-ЯМ-ХУМ', color: 'Зелёный', action: 'Вы материализуете через СТРУКТУРУ' },
            5: { name: 'ТРАНСФОРМАТОР', freq: '741 Гц', mantra: 'ОМ-ХАМ-ХУМ', color: 'Голубой', action: 'Вы материализуете через ИЗМЕНЕНИЕ' },
            6: { name: 'ЦЕЛИТЕЛЬ', freq: '852 Гц', mantra: 'ОМ-КШАМ-ХУМ', color: 'Синий', action: 'Вы материализуете через СЛУЖЕНИЕ' },
            7: { name: 'МИСТИК', freq: '963 Гц', mantra: 'ОМ-АУМ-ХУМ', color: 'Фиолетовый', action: 'Вы материализуете через ЗНАНИЕ' },
            8: { name: 'МАСТЕР МАТЕРИИ', freq: '174 Гц', mantra: 'ОМ-ГАМ-ХУМ', color: 'Чёрный/Золотой', action: 'Вы материализуете через МОЩЬ' },
            9: { name: 'ЗАВЕРШИТЕЛЬ', freq: '285 Гц', mantra: 'ОМ-АХ-ХУМ', color: 'Белый', action: 'Вы материализуете через ОТПУСКАНИЕ' }
        };

        // Описания священных форм
        const formDescriptions = {
            0: { name: 'КРУГ', type: 'Целостная', power: 'Вы видите ВСЮ КАРТИНУ сразу', use: 'Стратегия, видение, системное мышление' },
            1: { name: 'ТОЧКА', type: 'Лазерная', power: 'Абсолютный фокус на ОДНОМ', use: 'Решение одной сложной задачи' },
            2: { name: 'ЛИНИЯ', type: 'Сравнительная', power: 'Вы видите СВЯЗИ между вещами', use: 'Анализ, исследование, логика' },
            3: { name: 'ТРЕУГОЛЬНИК', type: 'Динамическая', power: 'Вы СИНТЕЗИРУЕТЕ новое из разного', use: 'Творчество, инновации' },
            4: { name: 'КВАДРАТ', type: 'Структурированная', power: 'Вы СТРОИТЕ систематически', use: 'Планирование, организация' },
            5: { name: 'ПЕНТАГРАММА', type: 'Многомерная', power: 'Вы ЧУВСТВУЕТЕ правильное направление', use: 'Интуитивное решение' },
            6: { name: 'ГЕКСАГРАММА', type: 'Балансирующая', power: 'Вы ГАРМОНИЗИРУЕТЕ противоположности', use: 'Управление конфликтами' },
            7: { name: 'СЕМИУГОЛЬНИК', type: 'Трансцендентная', power: 'Вы ВИДИТЕ скрытое', use: 'Исследование тайн, эзотерика' },
            8: { name: 'ОКТАЭДР', type: 'Мощная', power: 'Вы МЕНЯЕТЕ реальность', use: 'Материализация, магия' },
            9: { name: 'ЭННЕАГРАММА', type: 'Универсальная', power: 'Вы ИНТЕГРИРУЕТЕ всё в целое', use: 'Завершение проектов, синтез' }
        };

        // Описания цветов фокуса
        const colorDescriptions = {
            1: { color: 'КРАСНЫЙ', hex: '#e74c3c', effect: 'Энергия, действие, скорость', type: 'Взрывная, интенсивная' },
            2: { color: 'ОРАНЖЕВЫЙ', hex: '#e67e22', effect: 'Креативность, энтузиазм, радость', type: 'Творческая, игривая' },
            3: { color: 'ЖЁЛТЫЙ', hex: '#f39c12', effect: 'Ясность, оптимизм, интеллект', type: 'Аналитическая, логическая' },
            4: { color: 'ЗЕЛЁНЫЙ', hex: '#2ecc71', effect: 'Баланс, гармония, рост', type: 'Устойчивая, длительная' },
            5: { color: 'БИРЮЗОВЫЙ', hex: '#1abc9c', effect: 'Коммуникация, выражение, поток', type: 'Коммуникативная, социальная' },
            6: { color: 'ГОЛУБОЙ', hex: '#3498db', effect: 'Спокойствие, ясность, истина', type: 'Глубокая, медитативная' },
            7: { color: 'ФИОЛЕТОВЫЙ', hex: '#9b59b6', effect: 'Интуиция, духовность', type: 'Интуитивная, мистическая' },
            8: { color: 'ПУРПУРНЫЙ', hex: '#8e44ad', effect: 'Власть, трансформация, магия', type: 'Трансформирующая, мощная' },
            9: { color: 'ИНДИГО', hex: '#34495e', effect: 'Мудрость, знание, видение', type: 'Проникающая, всевидящая' },
            10: { color: 'ЗОЛОТОЙ', hex: '#f39c12', effect: 'Изобилие, успех', type: 'Изобильная, притягивающая' },
            11: { color: 'СЕРЕБРЯНЫЙ', hex: '#95a5a6', effect: 'Интуиция, луна, женская сила', type: 'Рецептивная, чувствительная' },
            12: { color: 'БЕЛЫЙ', hex: '#ecf0f1', effect: 'Чистота, целостность, единство', type: 'Универсальная, всеобъемлющая' }
        };

        // Описания Частоты Имени
        const nameFreqDescriptions = {
            1: { name: 'ЛИДЕР', sound: 'ОМ', effect: 'Уверенность, решительность, инициатива' },
            2: { name: 'ДИПЛОМАТ', sound: 'АУМ', effect: 'Баланс, интуиция, сотрудничество' },
            3: { name: 'ТВОРЕЦ', sound: 'ХУМ', effect: 'Творчество, выражение, радость' },
            4: { name: 'СТРОИТЕЛЬ', sound: 'ЛАМ', effect: 'Структура, дисциплина, выполнение' },
            5: { name: 'ТРАНСФОРМАТОР', sound: 'ВАМ', effect: 'Адаптация, свобода, изменение' },
            6: { name: 'ЦЕЛИТЕЛЬ', sound: 'ЯМ', effect: 'Гармония, служение, любовь' },
            7: { name: 'МИСТИК', sound: 'ХАМ', effect: 'Интуиция, знание, прозрение' },
            8: { name: 'МАСТЕР', sound: 'СО-ХАМ', effect: 'Власть, материализация, мастерство' },
            9: { name: 'МУДРЕЦ', sound: 'ОМ-АХ-ХУМ', effect: 'Мудрость, завершение, интеграция' }
        };

        // Описания сторон света
        const directionDescriptions = {
            0: { name: 'СЕВЕР', icon: '⬆️', energy: 'Мудрость, глубина, тайна', type: 'Глубокая, медитативная' },
            1: { name: 'ВОСТОК', icon: '➡️', energy: 'Новые начинания, рассвет', type: 'Энергичная, инициирующая' },
            2: { name: 'ЮГ', icon: '⬇️', energy: 'Страсть, эмоции, тепло', type: 'Страстная, эмоциональная' },
            3: { name: 'ЗАПАД', icon: '⬅️', energy: 'Завершение, закат, мудрость', type: 'Рефлексивная, завершающая' }
        };

        function sumDigits(num) {
            let sum = 0;
            while (num > 0) {
                sum += num % 10;
                num = Math.floor(num / 10);
            }
            return sum;
        }

        function reduceToSingleDigit(num) {
            while (num > 9) {
                num = sumDigits(num);
            }
            return num;
        }

        function calculateNameFrequency(name) {
            let sum = 0;
            name = name.toUpperCase().replace(/[^А-ЯЁ]/g, '');
            for (let letter of name) {
                sum += letterValues[letter] || 0;
            }
            return reduceToSingleDigit(sum);
        }

        function calculate() {
            const name = document.getElementById('name').value.trim();
            const day = parseInt(document.getElementById('day').value);
            const month = parseInt(document.getElementById('month').value);
            const year = parseInt(document.getElementById('year').value);

            if (!name || !day || !month || !year) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            if (day < 1 || day > 31 || month < 1 || month > 12 || year < 1900 || year > 2024) {
                alert('Пожалуйста, введите корректную дату!');
                return;
            }

            // Расчет всех параметров
            const dateString = `${day}.${month < 10 ? '0' + month : month}.${year}`;
            const allDigitsSum = sumDigits(day) + sumDigits(month) + sumDigits(year);
            
            // 1. ПКК - Персональный Квантовый Код
            const pkk = reduceToSingleDigit(allDigitsSum);
            
            // 2. ЧГ - Частота Гениальности
            const chg = 40 + allDigitsSum;
            
            // 3. СФФ - Священная Форма Фокуса (последняя цифра года)
            const sff = year % 10;
            
            // 4. ЧС - Часы Силы
            const hoursStart = (day * 2) % 24;
            const hoursSecondary = (hoursStart + 12) % 24;
            
            // 5. ЦФ - Цвет Фокуса (месяц)
            const cf = month;
            
            // 6. ЧИ - Частота Имени
            const nameFreq = calculateNameFrequency(name);
            
            // 7. СС - Сторона Силы
            const direction = allDigitsSum % 4;

            // Отображение результатов
            displayResults(name, dateString, pkk, chg, sff, hoursStart, hoursSecondary, cf, nameFreq, direction);
        }

        function displayResults(name, date, pkk, chg, sff, hours1, hours2, cf, nameFreq, direction) {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('results').classList.add('active');

            // Персональная информация
            document.getElementById('personalInfo').innerHTML = `
                <h2>${name}</h2>
                <p>Дата рождения: ${date}</p>
            `;

            const pkkData = pkkDescriptions[pkk];
            const sffData = formDescriptions[sff];
            const cfData = colorDescriptions[cf];
            const nameData = nameFreqDescriptions[nameFreq];
            const dirData = directionDescriptions[direction];

            document.getElementById('resultsContainer').innerHTML = `
                <!-- ПКК -->
                <div class="result-card code-${pkk}">
                    <div class="result-header">
                        <div class="result-title">🎯 Персональный Квантовый Код (ПКК)</div>
                        <div class="result-value">${pkk}</div>
                    </div>
                    <div class="result-description">
                        <strong>${pkkData.name}</strong> - ${pkkData.action}
                    </div>
                    <div class="result-meta">
                        <div class="meta-item">
                            <div class="meta-label">Частота</div>
                            <div class="meta-value">${pkkData.freq}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Мантра активации</div>
                            <div class="meta-value">${pkkData.mantra}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Цвет</div>
                            <div class="meta-value">${pkkData.color}</div>
                        </div>
                    </div>
                </div>

                <!-- ЧГ -->
                <div class="result-card code-3">
                    <div class="result-header">
                        <div class="result-title">⚡ Частота Гениальности (ЧГ)</div>
                        <div class="result-value">${chg} Гц</div>
                    </div>
                    <div class="result-description">
                        Это ваша уникальная частота, на которой ваш мозг работает максимально эффективно. 
                        Используйте эту частоту для медитации или фонового звука во время важной работы.
                    </div>
                </div>

                <!-- СФФ -->
                <div class="result-card code-5">
                    <div class="result-header">
                        <div class="result-title">🔷 Священная Форма Фокуса (СФФ)</div>
                        <div class="result-value">${sff}</div>
                    </div>
                    <div class="result-description">
                        <strong>${sffData.name}</strong> - ${sffData.power}
                    </div>
                    <div class="result-meta">
                        <div class="meta-item">
                            <div class="meta-label">Тип концентрации</div>
                            <div class="meta-value">${sffData.type}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Применение</div>
                            <div class="meta-value">${sffData.use}</div>
                        </div>
                    </div>
                </div>

                <!-- ЧС -->
                <div class="result-card code-6">
                    <div class="result-header">
                        <div class="result-title">⏰ Часы Силы (ЧС)</div>
                        <div class="result-value">${hours1}:00-${hours1+2}:00</div>
                    </div>
                    <div class="result-description">
                        Это ваше ПЕРВИЧНОЕ окно максимальной концентрации. Планируйте самые важные задачи на это время.
                    </div>
                    <div class="result-meta">
                        <div class="meta-item">
                            <div class="meta-label">Вторичное окно</div>
                            <div class="meta-value">${hours2}:00-${hours2+2}:00</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Рекомендация</div>
                            <div class="meta-value">Не отвлекайтесь в эти часы!</div>
                        </div>
                    </div>
                </div>

                <!-- ЦФ -->
                <div class="result-card code-7">
                    <div class="result-header">
                        <div class="result-title">🎨 Цвет Фокуса (ЦФ)</div>
                        <div class="result-value">${cfData.color} <span class="color-preview" style="background: ${cfData.hex}"></span></div>
                    </div>
                    <div class="result-description">
                        ${cfData.effect}
                    </div>
                    <div class="result-meta">
                        <div class="meta-item">
                            <div class="meta-label">Тип концентрации</div>
                            <div class="meta-value">${cfData.type}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Как использовать</div>
                            <div class="meta-value">Окружите себя этим цветом во время работы</div>
                        </div>
                    </div>
                </div>

                <!-- ЧИ -->
                <div class="result-card code-4">
                    <div class="result-header">
                        <div class="result-title">🔊 Частота Имени (ЧИ)</div>
                        <div class="result-value">${nameFreq}</div>
                    </div>
                    <div class="result-description">
                        <strong>Частота ${nameData.name}</strong> - ${nameData.effect}
                    </div>
                    <div class="result-meta">
                        <div class="meta-item">
                            <div class="meta-label">Звук активации</div>
                            <div class="meta-value">${nameData.sound}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Как использовать</div>
                            <div class="meta-value">Произносите 3 раза перед работой</div>
                        </div>
                    </div>
                </div>

                <!-- СС -->
                <div class="result-card code-8">
                    <div class="result-header">
                        <div class="result-title">🧭 Сторона Силы (СС)</div>
                        <div class="result-value"><span class="direction-icon">${dirData.icon}</span>${dirData.name}</div>
                    </div>
                    <div class="result-description">
                        ${dirData.energy}
                    </div>
                    <div class="result-meta">
                        <div class="meta-item">
                            <div class="meta-label">Тип концентрации</div>
                            <div class="meta-value">${dirData.type}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Рекомендация</div>
                            <div class="meta-value">Работайте лицом на ${dirData.name.toLowerCase()}</div>
                        </div>
                    </div>
                </div>
            `;

            // Прокрутка к результатам
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restart() {
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('results').classList.remove('active');
            document.getElementById('name').value = '';
            document.getElementById('day').value = '';
            document.getElementById('month').value = '';
            document.getElementById('year').value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
