<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персональный Калькулятор Энергий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .date-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .results {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .results.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .personal-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .personal-info h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .personal-info p {
            opacity: 0.9;
            font-size: 14px;
        }

        .cheatsheet {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            font-family: monospace;
            white-space: pre-line;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            font-size: 14px;
            line-height: 1.8;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .controls-bar {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .expand-all-btn {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
            width: auto;
        }

        .expand-all-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .accordion-item {
            margin-bottom: 15px;
        }

        .result-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 25px;
            border-left: 5px solid;
            transition: all 0.3s ease;
        }

        .result-card.code-1 { border-color: #e74c3c; }
        .result-card.code-2 { border-color: #e67e22; }
        .result-card.code-3 { border-color: #f39c12; }
        .result-card.code-4 { border-color: #2ecc71; }
        .result-card.code-5 { border-color: #3498db; }
        .result-card.code-6 { border-color: #9b59b6; }
        .result-card.code-7 { border-color: #8e44ad; }
        .result-card.code-8 { border-color: #34495e; }
        .result-card.code-9 { border-color: #ecf0f1; }

        .accordion-header {
            cursor: pointer;
            user-select: none;
        }

        .accordion-header:hover {
            transform: translateX(5px);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
            word-wrap: break-word;
            overflow-wrap: break-word;
            flex: 1;
        }

        .result-value {
            font-size: 32px;
            font-weight: 900;
            color: #764ba2;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .result-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 10px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .result-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .meta-item {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
        }

        .meta-label {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .meta-value {
            color: #333;
            font-weight: 600;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .expand-icon {
            font-size: 20px;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .expand-icon.rotated {
            transform: rotate(180deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .accordion-content.active {
            max-height: 5000px;
        }

        .details-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #e0e0e0;
        }

        .actions-section {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
        }

        .actions-title {
            font-weight: 700;
            color: #856404;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .actions-list {
            list-style: none;
            padding: 0;
        }

        .actions-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #666;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .actions-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #28a745;
            font-weight: bold;
        }

        .tip-box {
            background: #d1ecf1;
            border-left: 4px solid #17a2b8;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            color: #0c5460;
        }

        .warning-box {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            color: #721c24;
        }

        .ritual-section {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
        }

        .ritual-section h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .ritual-step {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid white;
        }

        .ritual-step h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            margin-top: 20px;
        }

        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        @media (max-width: 600px) {
            .content {
                padding: 25px;
            }

            .date-inputs {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .result-value {
                font-size: 20px;
            }

            .result-title {
                font-size: 16px;
            }

            .result-meta {
                grid-template-columns: 1fr;
            }

            .cheatsheet {
                font-size: 12px;
                padding: 15px;
            }

            .ritual-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">

                        <input type="number" id="year" placeholder="Год" min="1900" max="2024" required>

                <button onclick="calculate()">Рассчитать мои энергии</button>

            3: { color: 'ЖЁЛТЫЙ', hex: '#f39c12', effect: 'Ясность, оптимизм, интеллект', type: 'Аналитическая, логическая' },

        function sumDigits(num) {
            let total = 0;
            while (num > 0) {
                total += num % 10;
                num = Math.floor(num / 10);
            }
            return total;
        }

        function reduceToSingleDigit(num) {
            while (num > 9) {
                num = sumDigits(num);
            }
            return num;
        }

        function calculateNameFrequency(name) {
            let total = 0;
            name = name.toUpperCase().replace(/[^А-ЯЁ]/g, '');
            for (let letter of name) {
                total += letterValues[letter] || 0;
            }
            return reduceToSingleDigit(total);
        }

        function toggleAccordion(element) {
            const content = element.nextElementSibling;
            const icon = element.querySelector('.expand-icon');
            
            content.classList.toggle('active');
            icon.classList.toggle('rotated');
        }

        function expandAll() {
            document.querySelectorAll('.accordion-content').forEach(el => el.classList.add('active'));
            document.querySelectorAll('.expand-icon').forEach(el => el.classList.add('rotated'));
        }

        function collapseAll() {
            document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.expand-icon').forEach(el => el.classList.remove('rotated'));
        }

        function calculate() {
            const name = document.getElementById('name').value.trim();
            const day = parseInt(document.getElementById('day').value);
            const month = parseInt(document.getElementById('month').value);
            const year = parseInt(document.getElementById('year').value);

            if (!name || !day || !month || !year) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            if (day < 1 || day > 31 || month < 1 || month > 12 || year < 1900 || year > 2024) {
                alert('Пожалуйста, введите корректную дату!');
                return;
            }

            // Расчет всех параметров
            const dateString = `${day}.${month < 10 ? '0' + month : month}.${year}`;
            const allDigitsSum = sumDigits(day) + sumDigits(month) + sumDigits(year);
            
            const pkk = reduceToSingleDigit(allDigitsSum);
            const chg = 40 + allDigitsSum;
            const sff = year % 10;
            const hoursStart = (day * 2) % 24;
            const hoursSecondary = (hoursStart + 12) % 24;
            const cf = month;
            const nameFreq = calculateNameFrequency(name);
            const direction = allDigitsSum % 4;
            const element = day % 4;
            const rhythm = month * 5;

            displayResults(name, dateString, pkk, chg, sff, hoursStart, hoursSecondary, cf, nameFreq, direction, element, rhythm);
        }

        function displayResults(name, date, pkk, chg, sff, hours1, hours2, cf, nameFreq, direction, element, rhythm) {

                    • Полный эффект - через 21 день<br>
                    • Самое главное: ${hours1}:00-${hours1+2}:00 это СВЯТОЕ время!
                </div>
            `;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restart() {
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('results').classList.remove('active');
            document.getElementById('name').value = '';
            document.getElementById('day').value = '';
            document.getElementById('month').value = '';
            document.getElementById('year').value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
